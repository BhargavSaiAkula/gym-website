<!DOCTYPE html>
<html>
<head>
    <title>Chest Workouts - Bhargav Fitness</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🔥 Back Workouts</h1>
    <p>Build Powerful Back Muscles</p>
</header>

<section class="exercise-container">

     <div class="exercise-card">
        <img src="images/Cable Lat Pulldown (Wide Grip).gif" alt="Cable Lat Pulldown (Wide Grip)">
        <h3>Cable Lat Pulldown (Wide Grip)</h3>
    </div>

    <div class="exercise-card">
        <img src="images/Cable Seated Row.gif" alt="Cable Seated Row">
        <h3>Cable Seated Row</h3>

   <div class="exercise-card">
        <img src="images/Dumbbell One-Arm Row.gif" alt="Dumbbell One-Arm Row">

<div class="exercise-card">

    <div class="exercise-card">

    </div>

    <div class="exercise-card">
        <img src="images/Barbell Deadlift.gif" alt="Barbell Deadlift">
        <h3>Barbell Deadlift</h3>
    </div>
    

     <div class="exercise-card">
        <img src="images/Machine Assisted Pull-Up.gif" alt="Machine Assisted Pull-Up">

    </div>
 <div class="exercise-card">
