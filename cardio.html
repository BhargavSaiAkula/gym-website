<!DOCTYPE html>
<html>
<head>
    <title>Cardio Workouts - Bhargav Fitness</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="exercise-container">

    </div>
<div class="exercise-card">
        <img src="images/High knees.gif" alt="High knees">
        <h3>High knees</h3>
    </div>
   <div class="exercise-card">
        <img src="images/Mountain Climber .gif" alt="Mountain Climber">

        <img src="images/Elliptical Training .gif" alt="Elliptical Training">

    </div>

    <div class="exercise-card">
        <img src="images/Plank.gif" alt="Plank">

<div class="back-btn">
